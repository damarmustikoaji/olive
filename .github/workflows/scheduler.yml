name: AI Workforce Scheduler

on:
  schedule:
    # Every 15 minutes, all day UTC — the actual "is this a working hour in
    # Asia/Jakarta" decision happens in code (isWithinWorkingHours), not here.
    # GitHub's own schedule trigger is best-effort and frequently delayed or
    # dropped entirely (worse for public/free-tier repos under load) — an
    # hourly cron meant real gaps of several hours during the work day with
    # zero successful runs. Running 4x as often doesn't fix GitHub's
    # unreliability, but it means enough attempts land that a multi-hour gap
    # becomes rare instead of routine.
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Bypass the working-hours gate (manual testing only)"
        type: boolean
        default: false
  # Fired by supabase/functions/task-dispatch whenever a task row lands in
  # `backlog` or changes status, via the GitHub REST "create a repository
  # dispatch event" endpoint. Lets the runner react within seconds instead
  # of waiting up to 15 minutes for the next cron tick. Carries no payload —
  # the runner re-scans the full backlog/assigned set every run regardless
  # (same behavior as a cron tick), this is purely a "wake up now" signal.
  repository_dispatch:
    types: [task-changed]

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter "@ai-workforce/runner..." build

      - name: Run AI Workforce
        working-directory: apps/runner
        run: node dist/index.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_DEFAULT_MODEL: ${{ secrets.OPENROUTER_DEFAULT_MODEL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_RELEASE_READ_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          FORCE_RUN: ${{ inputs.force_run }}
          MAX_TASK_ATTEMPTS: "3"
          WORK_HOURS_START: "09:00"
          WORK_HOURS_END: "17:00"
          WORK_TIMEZONE: "Asia/Jakarta"
