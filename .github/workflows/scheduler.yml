name: AI Workforce Scheduler

on:
  schedule:
    # Every hour, all day UTC — the actual "is this a working hour in Asia/Jakarta"
    # decision happens in code (isWithinWorkingHours), not here, because cron
    # granularity/delay in GitHub Actions is not reliable enough to trust directly.
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter "@ai-workforce/runner..." build

      - name: Run AI Workforce
        working-directory: apps/runner
        run: node dist/index.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_DEFAULT_MODEL: ${{ secrets.OPENROUTER_DEFAULT_MODEL }}
          GH_TOKEN: ${{ secrets.GH_RELEASE_READ_TOKEN }}
          MAX_TASK_ATTEMPTS: "3"
          WORK_HOURS_START: "09:00"
          WORK_HOURS_END: "17:00"
          WORK_TIMEZONE: "Asia/Jakarta"
